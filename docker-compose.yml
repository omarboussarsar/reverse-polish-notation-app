services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    environment:
      APP_ENV: dev
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
